- id: worldpop_population_yearly
  name: Total population (WorldPop Global2)
  short_name: Total population
  variable: pop_total
  period_type: yearly
  sync_kind: release
  sync_availability:
    latest_available_function: climate_api.providers.availability.worldpop_release_latest_available
    # WorldPop projections are intentionally request-driven for future years.
    allow_future: true
  cache_info:
    eo_function: dhis2eo.data.worldpop.pop_total.yearly.download
    multiscales:
      levels: 4
    default_params:
      version: global2
  units: people
  resolution: 100m x 100m
  source: WorldPop Global2
  source_url: https://hub.worldpop.org/project/categories?id=3
