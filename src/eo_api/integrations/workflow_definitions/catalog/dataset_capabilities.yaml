version: "0.2.0"
datasets:
  chirps3:
    title: "CHIRPS3 Precipitation"
    provider_capabilities:
      source_temporal_resolution: "daily"
      supported_temporal_resolutions:
        - "daily"
        - "weekly"
        - "monthly"
      supported_output_formats:
        - "netcdf"
        - "zarr"
      supports:
        temporal_downsample: true
        temporal_disaggregate: false
      reducers:
        temporal:
          - "sum"
          - "mean"
        spatial:
          - "sum"
          - "mean"
    integration_capabilities:
      source_temporal_resolution: "daily"
      supported_temporal_resolutions:
        - "daily"
        - "weekly"
        - "monthly"
      supported_output_formats:
        - "netcdf"
      supports:
        temporal_downsample: true
        temporal_disaggregate: false
      reducers:
        temporal:
          - "sum"
          - "mean"
        spatial:
          - "sum"
          - "mean"
    stages:
      features:
        adapter: "workflow.features"
      download:
        adapter: "components.adapters.download.chirps3"
      temporal_aggregation:
        adapter: "components.adapters.temporal.chirps3"
      spatial_aggregation:
        adapter: "components.adapters.spatial.chirps3"
      dhis2_payload_builder:
        adapter: "components.adapters.payload.chirps3"
    collections:
      source:
        - id: "generic-chirps3-source"
          title: "Generic CHIRPS3 source collection"
          description: "Generic workflow namespaced source collection descriptor for CHIRPS3."
          rel: "collection"
          path: "/ogcapi/collections/generic-chirps3-source"
          exposed: true
          metadata_template:
            dataset_id: "chirps3"
            data_kind: "edr"
            provider_name: "dhis2eo"
            temporal_resolution: "daily"
            temporal_extent: ["1981-01-01", "present"]
            spatial_resolution: "0.05 degree (~5km)"
            output_formats: ["netcdf", "zarr"]
            parameter_options:
              stage: ["final", "prelim"]
              flavor: ["rnl", "sat"]
            query_patterns: ["position", "area", "cube"]
            constraints:
              - "If stage is prelim, flavor must be sat."
              - "Integration currently returns netcdf for workflow download stage."
              - "Temporal disaggregation is not supported."
      workflow_outputs:
        - id: "generic-dhis2-datavalue-preview"
          title: "Generic workflow DHIS2 dataValue preview"
          description: "Derived output collection for previewing workflow tabular payload output."
          rel: "derived-from"
          path: "/ogcapi/collections/generic-dhis2-datavalue-preview"
          exposed: true
          metadata_template:
            dataset_id: "chirps3"
            data_kind: "derived-feature"
            provider_name: "preview_datavalues"
            temporal_resolution: "workflow-input-dependent"
            temporal_extent: []
            spatial_resolution: "org unit geometry"
            output_formats: ["application/geo+json", "application/json"]
            query_patterns: ["items-by-job", "items-by-period"]
            constraints:
              - "Rows are scoped by job_id to prevent cross-run overwrite."
              - "Retention is controlled by EO_API_PREVIEW_TTL_DAYS."

  worldpop:
    title: "WorldPop Total Population"
    provider_capabilities:
      source_temporal_resolution: "yearly"
      supported_temporal_resolutions:
        - "yearly"
        - "annual"
      supported_output_formats:
        - "geotiff"
        - "netcdf"
        - "zarr"
      supports:
        temporal_downsample: true
        temporal_disaggregate: false
      reducers:
        temporal:
          - "sum"
          - "mean"
        spatial:
          - "sum"
          - "mean"
    integration_capabilities:
      source_temporal_resolution: "yearly"
      supported_temporal_resolutions:
        - "yearly"
        - "annual"
      supported_output_formats:
        - "netcdf"
      supports:
        temporal_downsample: true
        temporal_disaggregate: false
      reducers:
        temporal:
          - "sum"
          - "mean"
        spatial:
          - "sum"
          - "mean"
    stages:
      features:
        adapter: "workflow.features"
      download:
        adapter: "components.adapters.download.worldpop"
      temporal_aggregation:
        adapter: "components.adapters.temporal.worldpop"
      spatial_aggregation:
        adapter: "components.adapters.spatial.worldpop"
      dhis2_payload_builder:
        adapter: "components.adapters.payload.worldpop"
    collections:
      source:
        - id: "generic-worldpop-source"
          title: "Generic WorldPop source collection"
          description: "Generic workflow namespaced source collection descriptor for WorldPop."
          rel: "collection"
          path: "/ogcapi/collections/generic-worldpop-source"
          exposed: true
          metadata_template:
            dataset_id: "worldpop"
            data_kind: "coverage"
            provider_name: "rasterio"
            temporal_resolution: "yearly"
            temporal_extent: ["2015-01-01", "2030-12-31"]
            spatial_resolution: "1km (test fixture), provider variants available"
            output_formats: ["geotiff", "netcdf", "zarr"]
            query_patterns: ["coverage-domainset", "tiles", "zonal-aggregation"]
            constraints:
              - "Integration currently supports netcdf in workflow download stage."
              - "Temporal disaggregation is not supported."
      workflow_outputs:
        - id: "generic-dhis2-datavalue-preview"
          title: "Generic workflow DHIS2 dataValue preview"
          description: "Derived output collection for previewing workflow tabular payload output."
          rel: "derived-from"
          path: "/ogcapi/collections/generic-dhis2-datavalue-preview"
          exposed: true
          metadata_template:
            dataset_id: "worldpop"
            data_kind: "derived-feature"
            provider_name: "preview_datavalues"
            temporal_resolution: "workflow-input-dependent"
            temporal_extent: []
            spatial_resolution: "org unit geometry"
            output_formats: ["application/geo+json", "application/json"]
            query_patterns: ["items-by-job", "items-by-period"]
            constraints:
              - "Rows are scoped by job_id to prevent cross-run overwrite."
              - "Retention is controlled by EO_API_PREVIEW_TTL_DAYS."
