name: "download_dataset"
version: "v1"
description: "Download dataset files for period and bbox."
input_schema:
  type: "object"
  properties:
    dataset_id:
      type: "string"
    start:
      type: "string"
    end:
      type: "string"
    overwrite:
      type: "boolean"
    country_code:
      type: 
        - "string"
        - "null"
    bbox:
      type: "array"
      items:
        type: "number"
      minItems: 4
      maxItems: 4
  required:
    - "dataset_id"
    - "start"
    - "end"
    - "overwrite"
    - "bbox"
config_schema:
  type: "object"
  properties:
    overwrite:
      type: "boolean"
    country_code:
      type:
        - "string"
        - "null"
  additionalProperties: false
output_schema:
  type: "object"
  properties:
    status:
      type: "string"