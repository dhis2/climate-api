name: "spatial_aggregation"
version: "v1"
description: "Aggregate gridded dataset to features."
input_schema:
  type: "object"
  properties:
    dataset_id:
      type: "string"
    start:
      type: "string"
    end:
      type: "string"
    feature_source:
      type: "object"
    method:
      type: "string"
  required:
    - "dataset_id"
    - "start"
    - "end"
    - "feature_source"
    - "method"
config_schema:
  type: "object"
  properties:
    method:
      type: "string"
    feature_id_property:
      type: "string"
  additionalProperties: false
output_schema:
  type: "object"
  properties:
    records:
      type: "array"