- id: era5land_temperature_hourly
  name: 2m temperature (ERA5-Land)
  short_name: 2m temperature
  variable: t2m
  period_type: hourly
  sync:
    kind: temporal
    execution: append
    availability:
      latest_available_function: climate_service.providers.availability.lagged_latest_available
      lag_hours: 120
  extents:
    spatial:
      bbox: [-180, -90, 180, 90]
    temporal:
      begin: "1950-01-01"
      resolution: PT1H
  ingestion:
    plugin: climate_service.streaming.plugins.era5_land.ERA5LandHourlySingleBandPlugin
    default_params:
      variable: t2m
  transforms:
    - climate_service.transforms.kelvin_to_celsius
  units: degC
  resolution: 9 km x 9 km
  source: ERA5-Land Reanalysis
  source_url: https://earthdatahub.destine.eu/collections/era5/datasets/reanalysis-era5-land
  display:
    colormap: rdbu_r
    range: [-30.0, 30.0]

- id: era5land_precipitation_hourly
  name: Total precipitation (ERA5-Land)
  short_name: Total precipitation
  variable: tp
  period_type: hourly
  sync:
    kind: temporal
    execution: append
    availability:
      latest_available_function: climate_service.providers.availability.lagged_latest_available
      lag_hours: 120
  extents:
    spatial:
      bbox: [-180, -90, 180, 90]
    temporal:
      begin: "1950-01-01"
      resolution: PT1H
  ingestion:
    plugin: climate_service.streaming.plugins.era5_land.ERA5LandPrecipitationPlugin
    default_params: {}
  transforms:
    - climate_service.transforms.metres_to_mm
  units: mm
  resolution: 9 km x 9 km
  source: ERA5-Land Reanalysis
  source_url: https://earthdatahub.destine.eu/collections/era5/datasets/reanalysis-era5-land
  display:
    colormap: blues
    range: [0.0, 5.0]
    nodata: 0.0
