- id: worldpop_population_yearly
  name: Total population (WorldPop Global2)
  short_name: Total population
  variable: pop_total
  period_type: yearly
  sync:
    kind: release
    availability:
      latest_available_function: open_climate_service.providers.availability.worldpop_release_latest_available
      # WorldPop projections are intentionally request-driven for future years.
      allow_future: true
  extents:
    spatial:
      bbox: [-180, -90, 180, 90]
    temporal:
      begin: "2015"
      end: "2030"
      resolution: P1Y
  ingestion:
    plugin: open_climate_service.streaming.plugins.worldpop.WorldPopYearlyPlugin
    default_params:
      version: global2
      product: total
      variable: pop_total
  units: people
  resolution: 100m x 100m
  source: WorldPop Global2
  source_url: https://hub.worldpop.org/project/categories?id=3
  display:
    colormap: reds
    range: [0.5, 100.0]
