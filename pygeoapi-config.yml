server:
  bind:
    host: 127.0.0.1
    port: 5000
  url: http://127.0.0.1:8000/ogcapi
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  gzip: false
  languages:
    # First language is the default language
    - en-US
    - fr-CA
  # cors: true
  pretty_print: true
  limits:
    default_items: 20
    max_items: 50
  # templates:
  # path: /path/to/Jinja2/templates
  # static: /path/to/static/folder # css/js/img
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  manager:
    name: TinyDB
    connection: /tmp/pygeoapi-process-manager.db
    output_dir: /tmp/
  # ogc_schemas_location: /opt/schemas.opengis.net
  admin: false # enable admin api

logging:
  level: ERROR
  #logfile: /tmp/pygeoapi.log

metadata:
  identification:
    title:
      en: DHIS2 EO API
    description:
      en: OGC API compliant geospatial data API
    keywords:
      en:
        - geospatial
        - data
        - api
    keywords_type: theme
    terms_of_service: https://creativecommons.org/licenses/by/4.0/
    url: https://example.org
  license:
    name: CC-BY 4.0 license
    url: https://creativecommons.org/licenses/by/4.0/
  provider:
    name: DHIS2 EO API
    url: https://dhis2.org
  contact:
    name: DHIS2 Climate Team
    email: climate@dhis2.org
    role: pointOfContact

resources:
  worldpop_population_yearly:
    type: collection
    title: Population density
    description: Population density
    keywords:
      - population
    extents:
      spatial:
        bbox: [-13.3035, 6.9176, -10.2658, 10.0004]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
      temporal:
        begin: 2015-01-01T00:00:00Z
        end: 2030-12-31T23:59:59Z
        trs: http://www.opengis.net/def/uom/ISO-8601/0/Gregorian
        resolution: P1Y
        default: 2026-01-01T00:00:00Z
    links:
      - type: text/html
        rel: canonical
        title: information
        href: https://hub.worldpop.org/geodata/summary?id=75360
        hreflang: en-EN
    providers:
      - type: coverage
        name: xarray
        data: data/downloads/worldpop_population_yearly.zarr
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/4326
        x_field: x
        y_field: y
        time_field: time
        format:
          name: zarr
          mimetype: application/zip
        options:
          zarr:
            consolidated: true
          squeeze: true
      - type: tile
        name: eo_api.ogc_api.plugins.providers.titiler.TiTilerProvider
        data: data/downloads/worldpop_population_yearly.zarr
        format:
          name: png
          mimetype: image/png
        options:
          scheme: WebMercatorQuad
          endpoint: /zarr/tiles
          variable: pop_total
