- id: era5land_temperature_hourly
  name: 2m temperature (ERA5-Land)
  short_name: 2m temperature
  variable: t2m
  sync:
    kind: temporal
    execution: append
    availability:
      latest_available_function: climate_api.providers.availability.lagged_latest_available
      lag_hours: 120
  extents:
    spatial:
      bbox: [-180, -90, 180, 90]
      crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    temporal:
      begin: "1950-01-01"
      trs: http://www.opengis.net/def/uom/ISO-8601/0/Gregorian
      resolution: PT1H
  ingestion:
    function: dhis2eo.data.destine.era5_land.hourly.download
    default_params:
      variables: ['t2m']
  transforms:
    - climate_api.transforms.kelvin_to_celsius
  units: degC
  resolution: 9 km x 9 km
  source: ERA5-Land Reanalysis
  source_url: https://earthdatahub.destine.eu/collections/era5/datasets/reanalysis-era5-land
  display:
    colormap: rdbu_r
    range: [15.0, 40.0]

- id: era5land_precipitation_hourly
  name: Total precipitation (ERA5-Land)
  short_name: Total precipitation
  variable: tp
  sync:
    kind: temporal
    execution: append
    availability:
      latest_available_function: climate_api.providers.availability.lagged_latest_available
      lag_hours: 120
  extents:
    spatial:
      bbox: [-180, -90, 180, 90]
      crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    temporal:
      begin: "1950-01-01"
      trs: http://www.opengis.net/def/uom/ISO-8601/0/Gregorian
      resolution: PT1H
  ingestion:
    function: dhis2eo.data.destine.era5_land.hourly.download
    default_params:
      variables: ['tp']
  transforms:
    - climate_api.transforms.metres_to_mm
  units: mm
  resolution: 9 km x 9 km
  source: ERA5-Land Reanalysis
  source_url: https://earthdatahub.destine.eu/collections/era5/datasets/reanalysis-era5-land
  display:
    colormap: blues
    range: [0.0, 5.0]
    nodata: 0.0
