- id: worldpop_population_yearly
  name: Total population (WorldPop Global2)
  short_name: Total population
  variable: pop_total
  period_type: yearly
  sync:
    kind: release
  extents:
    spatial:
      bbox: [-180, -90, 180, 90]
    temporal:
      begin: "2015"
      end: "2030"
      resolution: P1Y
  ingestion:
    plugin: climate_api.ingest.plugins.worldpop.WorldPopPlugin
    params:
      # country_code is injected automatically from extent.country_code in climate-api.yaml
      version: global2
  units: people
  resolution: 100m x 100m
  source: WorldPop Global2
  source_url: https://hub.worldpop.org/project/categories?id=3
  display:
    colormap: reds
    range: [0.0, 25.0]
