- id: worldpop_population_yearly
  name: Total population (WorldPop Global2)
  short_name: Total population
  variable: pop_total
  period_type: yearly
  sync:
    kind: release
    availability:
      latest_available_function: climate_api.providers.availability.worldpop_release_latest_available
      # WorldPop projections are intentionally request-driven for future years.
      allow_future: true
  extents:
    spatial:
      bbox: [-180, -90, 180, 90]
    temporal:
      begin: "2015"
      end: "2030"
      resolution: P1Y
  ingestion:
    plugin: climate_api.ingest.plugins.worldpop.WorldPopPlugin
    params:
      # country_code is required — set the ISO 3166-1 alpha-3 code for your deployment
      # e.g. country_code: NOR
      version: global2
    function: dhis2eo.data.worldpop.pop_total.yearly.download
    default_params:
      version: global2
  units: people
  resolution: 100m x 100m
  source: WorldPop Global2
  source_url: https://hub.worldpop.org/project/categories?id=3
  display:
    colormap: reds
    range: [0.0, 25.0]
    nodata: 0.0
