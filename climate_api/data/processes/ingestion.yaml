- id: ingestion
  title: Dataset ingestion
  description: Materialize one managed dataset for the configured extent using the dataset template's ingestion path.
  version: "0.1.0"
  expose: true
  keywords:
    - climate
    - ingestion
    - datasets
  jobControlOptions:
    - sync-execute
    - async-execute
  inputs:
    dataset_id:
      type: string
      required: true
      description: Source dataset template id to ingest.
    start:
      type: string
      required: true
      description: Start of the requested period range.
    end:
      type: string
      required: false
      description: End of the requested period range. Defaults to today's UTC period for the dataset.
    overwrite:
      type: boolean
      required: false
      default: false
      description: Rebuild an existing matching artifact instead of reusing it.
    prefer_zarr:
      type: boolean
      required: false
      default: true
      description: Prefer a chunked store when the ingestion path supports it.
    publish:
      type: boolean
      required: false
      default: true
      description: Publish the resulting artifact after materialization.
  outputs:
    ingestion_id:
      type: string
      description: Identifier of the ingestion event.
    status:
      type: string
      description: Execution status for the synchronous response.
    dataset:
      type: object
      description: Managed dataset summary produced or resolved by the ingestion.
  execution:
    function: climate_api.ingestions.processes.execute_ingestion
