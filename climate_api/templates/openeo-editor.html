<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>openEO Editor — {{ name }}</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body,
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        overflow: hidden;
        display: block;
      }
    </style>
  </head>
  <body>
    <iframe
      src="https://editor.openeo.org/?server={{ server_url }}&server-title={{ name | urlencode }}"
      allow="clipboard-read; clipboard-write"
      title="openEO Web Editor"
    ></iframe>
  </body>
</html>
